<div class="card" [formGroup]="form">
  <div class="card-head">
    <div class="card-title">Personal <em>details</em></div>
    <div class="card-desc">Your name and contact information — the first thing a recruiter sees.</div>
  </div>

  <div class="grid2">
    <div class="fg">
      <label>Full Name</label>
      <input formControlName="name" placeholder="e.g. John Ayomide Akinola"
        (input)="onFieldChange('name', form.get('name')!.value)"/>
    </div>
    <div class="fg">
      <label>Professional Title</label>
      <input formControlName="role" placeholder="e.g. Frontend Developer"
        (input)="onFieldChange('role', form.get('role')!.value)"/>
    </div>
    <div class="fg">
      <label>Email Address</label>
      <input type="email" formControlName="email" placeholder="you@email.com"
        (input)="onFieldChange('email', form.get('email')!.value)"/>
    </div>
    <div class="fg">
      <label>Phone Number</label>
      <input formControlName="phone" placeholder="+234 800 000 0000"
        (input)="onFieldChange('phone', form.get('phone')!.value)"/>
    </div>
    <div class="fg">
      <label>LinkedIn</label>
      <input formControlName="linkedin" placeholder="linkedin.com/in/yourname"
        (input)="onFieldChange('linkedin', form.get('linkedin')!.value)"/>
    </div>
    <div class="fg">
      <label>Portfolio / Website</label>
      <input formControlName="portfolio" placeholder="yourportfolio.com"
        (input)="onFieldChange('portfolio', form.get('portfolio')!.value)"/>
    </div>
    <div class="fg w2">
      <label>Professional Summary (optional)</label>
      <textarea formControlName="summary"
        placeholder="A brief overview of your background and what you bring to the role..."
        (input)="onFieldChange('summary', form.get('summary')!.value)"></textarea>
    </div>
  </div>

  <div class="btn-row">
    <span></span>
    <button class="btn btn-primary" (click)="next()">Experience &rarr;</button>
  </div>
</div>
